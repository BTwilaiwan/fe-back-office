<ng-container *ngIf="loadingService.isLoading$ | async">
  <p-blockUI [blocked]="(loadingService.isLoading$ | async) ?? false" [baseZIndex]="3000" appendTo="self">
    <div class="blockui-center">
        <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s" />
    </div>
  </p-blockUI>
</ng-container>

<div class="layout">
  <div class="sidebar">
    <app-left-menu></app-left-menu>
  </div>

  <div class="main-content">
    <app-nav-bar></app-nav-bar>
    <div class="router-container">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
