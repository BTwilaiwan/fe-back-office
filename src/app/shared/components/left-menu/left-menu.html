<div class="left-menu" #menuWrapper>
  <p-panelmenu [model]="menus">
    <!-- <ng-template pTemplate="start">
       <img src="assets/images/localMart.png" alt="errorImg" width="150" height="125">
    </ng-template> -->
    <ng-template #item let-item>
      <a pRipple class="flex items-center px-4 py-2 cursor-pointer group"
        [class.active-menu-item]="item.styleClass === 'active-menu-item' && !item.items">
          <i [class]="item.icon + ' text-primary group-hover:text-inherit'"
            [class.active-menu-item]="item.styleClass === 'active-menu-item' && !item.items"></i>
          <span class="ms-2">{{ item.label }}</span>
          <!-- <p-badge *ngIf="item.badge" class="ms-auto" [value]="item.badge" /> -->
          <!-- <span *ngIf="item.shortcut" class="ms-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">{{ item.shortcut }}</span> -->
      </a>
    </ng-template>
  </p-panelmenu>
</div>
